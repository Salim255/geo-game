<div class="introduction">
  <div class="introduction__content">
    <h1 class="introduction__title">Introduction</h1>

    <div class="introduction__paragraphs">
      @for (item of instructions(); track $index) {
        <p>{{ item }}</p>
      }
    </div>

    <button class="introduction__button" (click)="startGame()">
      Commencer l’aventure
    </button>
  </div>
</div>
