<div class="puzzle">

  <!-- HEADER -->
  <div class="puzzle__header">
    <h2 class="puzzle__title">Énigme à résoudre</h2>
    <p class="puzzle__subtitle">
      Complétez les cases vides pour révéler le mot final.
    </p>
  </div>

  <!-- TABLE 1 -->
  <div class="puzzle__section">
    <h3 class="puzzle__section-title">Tableau principal</h3>

    <div class="puzzle__grid puzzle__grid--main">

      <!-- Row 1 -->
      <div class="puzzle__row">
        <div class="puzzle__cell">1</div>
        <div class="puzzle__cell">5</div>
        <div class="puzzle__cell">9</div>
        <div class="puzzle__cell">7</div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell">6</div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
      </div>

      <!-- Row 2 -->
      <div class="puzzle__row">
        <div class="puzzle__cell">L</div>
        <div class="puzzle__cell">A</div>
        <div class="puzzle__cell">U</div>
        <div class="puzzle__cell">R</div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell">N</div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
      </div>

      <!-- Row 3 -->
      <div class="puzzle__row">
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell">8</div>
        <div class="puzzle__cell">2</div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell">4</div>
        <div class="puzzle__cell">3</div>
        <div class="puzzle__cell">6</div>
      </div>

      <!-- Row 4 -->
      <div class="puzzle__row">
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell">T</div>
        <div class="puzzle__cell">K</div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell">V</div>
        <div class="puzzle__cell">I</div>
        <div class="puzzle__cell">N</div>
      </div>

    </div>
  </div>

  <!-- TABLE 2 -->
  <div class="puzzle__section">
    <h3 class="puzzle__section-title">Extraction finale</h3>

    <div class="puzzle__grid puzzle__grid--extract">

      <!-- Row 1 -->
      <div class="puzzle__row">
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
        <div class="puzzle__cell puzzle__cell--empty"></div>
      </div>

      <!-- Row 2 -->
      <div class="puzzle__row">
        <div class="puzzle__cell">L</div>
        <div class="puzzle__cell">I</div>
        <div class="puzzle__cell">E</div>
        <div class="puzzle__cell">N</div>
      </div>

    </div>
  </div>

  <!-- INSTRUCTIONS -->
  <div class="puzzle__instructions">
    <p class="puzzle__instructions-text">
      Trouvez les lettres manquantes dans le premier tableau, puis placez-les
      dans les cases du second tableau pour révéler le mot final.
    </p>
  </div>

</div>
