<div class="action-screen">

  <h2 class="action-title">Grand Place — Défi 1</h2>

  <div class="story-block">
    <p class="story-paragraph">Êtes-vous prêtes à relever le défi…</p>
    <p class="story-paragraph">Alors prouvez-le dès maintenant…</p>
  </div>

  <div class="actions-block">
    <div class="action-item">
      <div class="action-header">Action</div>
      <p class="action-paragraph">1,2,3 cri de guerre !!!!</p>
    </div>
  </div>

  <div class="question-block">
    <div class="question-text">Quel est votre cri de guerre ?</div>
    <input type="text" placeholder="Votre réponse…">
  </div>

  <div class="action-buttons">
    <button class="btn btn-primary">Valider</button>
    <button class="btn btn-ghost">Passer</button>
  </div>

  <div class="feedback success">Correct. The first path opens.</div>

</div>
