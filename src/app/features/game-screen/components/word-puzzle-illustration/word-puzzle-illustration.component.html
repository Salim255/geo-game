<div class="wp-illustration">

  <!-- CONTEXT -->
  <div class="wp-illustration__context">
    @for (item of currentChallenge()?.story?.context; track $index) {
       <p class="wp-illustration__context-text">
        {{ item }}
       </p>
    }
  </div>

  <!-- TITLE -->
  <h3 class="wp-illustration__title">Indice:</h3>
  <p class="wp-illustration__subtitle">
  <!--   Exemple visuel pour comprendre comment extraire les lettres utiles. -->
  </p>

  <!-- GRID -->
  <div class="wp-illustration__grid">

    <!-- ROW 1 -->
    <div class="wp-illustration__row">
      <div class="wp-illustration__label">mot1</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
    </div>

    <!-- ROW 2 -->
    <div class="wp-illustration__row">
      <div class="wp-illustration__label">mot2</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
    </div>

    <!-- ROW 3 -->
    <div class="wp-illustration__row">
      <div class="wp-illustration__label">mot3</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
    </div>

    <!-- ROW 4 -->
    <div class="wp-illustration__row">
      <div class="wp-illustration__label">mot4</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--on">?</div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
      <div class="wp-illustration__cell wp-illustration__cell--off"></div>
    </div>

  </div>

  <p class="wp-illustration__explanation">
  <!--   Prenez les deux premières lettres de chaque mot, de haut en bas,
    pour obtenir le mot final. -->
  </p>

  <!-- QUESTION -->
  <div class="wp-illustration__question">
    @for (item of currentChallenge()?.question?.text; track $index) {
      <p class="wp-illustration__question-text">
        {{ item }}
      </p>
    }

    <input
      type="text"
      class="wp-illustration__input"
      placeholder="Votre réponse…"
      [(ngModel)]="userAnswer"
    />

    <button class="wp-illustration__btn" (click)="onSend()">Valider</button>
  </div>

</div>
