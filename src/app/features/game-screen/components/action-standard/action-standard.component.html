<div class="action-standard">

  <!-- TOP -->
  <div class="action-standard__top">
    <h2 class="action-standard__header">Action à réaliser</h2>
  </div>

  <!-- CONTENT -->
  <div class="action-standard__content">

    <!-- CONTEXT (optional) -->
    @if (context()?.length) {
      <div class="action-standard__context">
        @for (c of context(); track c) {
          <p class="action-standard__context-text">{{ c }}</p>
        }
      </div>
    }

    <!-- ACTION BLOCK -->
    <div class="action-standard__block">
      <h3 class="action-standard__title">{{ action()?.header }}</h3>

      @for (p of action()?.paragraphs; track p) {
        <p class="action-standard__text">{{ p }}</p>
      }
    </div>

  </div>

  <!-- BOTTOM -->
  <div class="action-standard__bottom">
    <button class="action-standard__btn action-standard__btn--primary"
            (click)="confirm()">
      Action réalisée
    </button>
  </div>

</div>
